name: Daily Trending Repos

on:
  schedule:
    # 每天 UTC 0:00（北京时间 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  search-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Search trending repos
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          ENABLE_AI_DESCRIPTION_REWRITE: ${{ secrets.OPENAI_API_KEY != '' && 'true' || 'false' }}
        run: |
          chmod +x scripts/search.py
          python3 scripts/search.py > README.md

      - name: Commit & push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update trending repos $(date +%Y-%m-%d)"
          git push
