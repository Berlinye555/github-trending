name: Daily Trending Repos

on:
  schedule:
    # 每天 UTC 0:00（北京时间 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  search-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Search trending repos
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          ENABLE_AI_DESCRIPTION_REWRITE: ${{ secrets.OPENAI_API_KEY != '' && 'true' || 'false' }}
        run: |
          ARGS="README.md --changeset scripts/.changeset.json"
          python3 scripts/search.py $ARGS

      - name: Build commit message
        id: commit_msg
        run: |
          if [ -f scripts/.changeset.json ]; then
            NEW=$(python3 -c "import json; d=json.load(open('scripts/.changeset.json')); print(d['new_total'])")
            DB=$(python3 -c "import json; d=json.load(open('scripts/.changeset.json')); print(d['db_total'])")
            echo "message=chore: +${NEW} new repos — ${DB} total in database" >> $GITHUB_OUTPUT
          else
            echo "message=chore: update trending repos $(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md scripts/repos.json
          git diff --staged --quiet || git commit -m "${{ steps.commit_msg.outputs.message }}"
          git push
